<!DOCTYPE html>
<html data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Realtime Chat{% endblock %}</title>
    <!-- Apply saved theme before render to avoid flash -->
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-bs-theme', saved);
        })();
    </script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Realtime Chat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% block nav_items %}
                    {% endblock %}
                    <li class="nav-item ms-2">
                        <button id="theme-toggle" class="btn btn-sm btn-outline-light" title="Toggle light/dark mode">
                            <span id="theme-icon">☀</span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');

            function applyTheme(theme) {
                html.setAttribute('data-bs-theme', theme);
                icon.textContent = theme === 'dark' ? '☀' : '☽';
                localStorage.setItem('theme', theme);
            }

            // Sync icon to current theme on load
            applyTheme(html.getAttribute('data-bs-theme') || 'light');

            btn.addEventListener('click', function() {
                const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                applyTheme(next);
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
